<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ngày xửa ngày xưa studio</title>
    <style>
      :root {
        color: #111111;
        background: #ffffff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: #ffffff;
        color: #111111;
      }

      .page {
        min-height: 100vh;
        display: grid;
        grid-template-rows: 1fr auto;
        padding: 32px 24px;
      }

      @media (max-width: 768px) {
        .page {
          padding: 20px 20px;
        }

        footer {
          padding-top: 20px;
        }
      }

      main {
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      h1 {
        max-width: 920px;
        margin: 0;
        font-size: clamp(36px, 8vw, 92px);
        font-weight: 500;
        line-height: 1.04;
        letter-spacing: 0;
      }

      footer {
        padding-top: 32px;
        text-align: center;
        font-size: 14px;
        line-height: 1.5;
        color: #555555;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main>
        <h1>I build great companies with great people.</h1>
      </main>
      <footer>© 2024. Ngày xửa ngày xưa studio</footer>
    </div>
  </body>
</html>
